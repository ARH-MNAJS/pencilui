name: RFC (breaking change or new component)
description: Propose a breaking change, new component, or significant architectural change
labels: ["rfc", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Significant changes go through an RFC. After this issue is accepted, open a PR adding `rfcs/<number>-<slug>.md` with the full proposal.

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "Add Combobox component"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: Design
      description: API shape, props, behavior, a11y considerations.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
    validations:
      required: true

  - type: textarea
    id: drawbacks
    attributes:
      label: Drawbacks
